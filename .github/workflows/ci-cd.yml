name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

# Cancel previous runs of the same PR but do not cancel previous runs on main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TERM: linux
  TERMINFO: /etc/terminfo
  PYTHONIOENCODING: utf-8

jobs:
  check:
    uses: ./.github/workflows/client-check.yml
    with:
      working-directory: "py"
      python-version: "3.10"

  docs-test:
    uses: ./.github/workflows/client-docs.yml
    with:
      working-directory: "py"

  client-test:
    uses: ./.github/workflows/client-tests.yml
    with:
      working-directory: "py"
    secrets:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

  js-go-client-test:
    uses: ./.github/workflows/client-js-go-tests.yml
    with:
      working-directory: "."
    secrets:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

  garnet-profile:
    name: Garnet Runtime Profile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: py
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Garnet Runtime Visibility
        uses: garnet-org/action@v2
        with:
          api_token: ${{ secrets.GARNET_API_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: false
          version: "0.10.9"
          activate-environment: "true"
          python-version: "3.12"

      - name: Install Python packages
        run: uv sync --all-extras

      - name: Build protobuf
        run: inv protoc
